---
on: [push, pull_request]          # yamllint disable-line rule:truthy
name: Integration Tests

permissions:
  contents: read

jobs:
  validate-structure:
    name: Validate Plugin Structure
    runs-on: [self-hosted, builder02, docker]
    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin disable switch + ruleRemoveById range
        run: |
          # The CRS convention: the master off-switch lives at <base>+099 and
          # disables the rule block via ctl:ruleRemoveById. Verify it exists
          # and that the disabled range stays inside 9529100-9529199.
          echo "Checking master disable rule 9529099..."
          if grep -q 'id:9529099' plugins/vimbadmin-before.conf && \
             grep -q 'ctl:ruleRemoveById=9529100-9529199' plugins/vimbadmin-before.conf; then
            echo "✓ 9529099 disables the 9529100-9529199 block"
          else
            echo "ERROR: master disable rule 9529099 missing or wrong range"
            exit 1
          fi

      - name: Verify NO host gate (scoping is the per-vhost enable flag)
        run: |
          # Scoping moved from a fragile Host-header gate (tx.vimbadmin_host)
          # to the per-vhost enable flag (tx.vimbadmin-plugin_enabled, OFF by
          # default, set to 1 only in the ViMbAdmin server/location block).
          # The host gate must be fully gone from every plugin file.
          echo "Checking the host gate is removed..."
          if grep -q 'vimbadmin_host' plugins/*.conf; then
            echo "ERROR: tx.vimbadmin_host still referenced; host gate not removed"
            grep -n 'vimbadmin_host' plugins/*.conf
            exit 1
          fi
          echo "✓ No host gate; scoping is the enable flag"

      - name: Verify enable flag gates before + after
        run: |
          # Both the exclusion block (before) and the allowlist layer (after)
          # must be skipped unless tx.vimbadmin-plugin_enabled == 1.
          echo "Checking enable-flag gates..."
          FAILED=0
          grep -q 'TX:vimbadmin-plugin_enabled "!@eq 1"' plugins/vimbadmin-before.conf || \
            { echo "ERROR: before.conf missing enable-flag gate (9529099)"; FAILED=1; }
          grep -q 'TX:vimbadmin-plugin_enabled "!@eq 1"' plugins/vimbadmin-after.conf || \
            { echo "ERROR: after.conf missing enable-flag gate (9529200)"; FAILED=1; }
          [ "$FAILED" -eq 0 ] && echo "✓ Enable flag gates before + after"
          [ "$FAILED" -eq 0 ] || exit 1

      - name: Verify positive-security layer is opt-in
        run: |
          # The allowlist deny rules must be skipped unless
          # tx.vimbadmin-plugin_positive_security == 1, so a default install
          # never blocks. Rule 9529201 enforces this (9529200 gates the whole
          # plugin on tx.vimbadmin-plugin_enabled).
          echo "Checking opt-in gate for the positive-security layer..."
          if grep -q 'id:9529201' plugins/vimbadmin-after.conf && \
             grep -q 'vimbadmin-plugin_positive_security' plugins/vimbadmin-after.conf && \
             grep -q 'ctl:ruleRemoveById=9529202-9529399' plugins/vimbadmin-after.conf; then
            echo "✓ Positive-security layer is opt-in (gated by 9529201)"
          else
            echo "ERROR: positive-security opt-in gate (9529200) missing or wrong"
            exit 1
          fi

      - name: Verify config seeds default vars conditionally
        run: |
          # The config rules must only seed each tx var if it has not been set
          # before (&TX:var @eq 0), per CRS convention, so a global override wins.
          echo "Checking conditional defaults in vimbadmin-config.conf..."
          FAILED=0
          for id in 9529010 9529012; do
            if ! grep -q "id:$id" plugins/vimbadmin-config.conf; then
              echo "ERROR: config rule $id missing"
              FAILED=1
            fi
          done
          grep -q '&TX:vimbadmin-plugin_enabled "@eq 0"' plugins/vimbadmin-config.conf || \
            { echo "ERROR: enabled var not seeded conditionally"; FAILED=1; }
          # OFF by default: the seeder must set the enable flag to 0, not 1.
          grep -q "setvar:'tx.vimbadmin-plugin_enabled=0'" plugins/vimbadmin-config.conf || \
            { echo "ERROR: enable flag default is not 0 (plugin must be off by default)"; FAILED=1; }
          [ "$FAILED" -eq 0 ] && echo "✓ Config seeds defaults conditionally"
          [ "$FAILED" -eq 0 ] || exit 1

      - name: "Verify ver: tag on every rule"
        run: |
          # CRS plugin convention: each rule carries a ver: tag matching the
          # plugin version. Flag any SecRule/SecAction id: without a ver:.
          echo "Checking every rule carries a ver: tag..."
          MISSING=0
          # Collapse line-continuations, then check each rule block.
          awk 'BEGIN{RS=""} /id:[0-9]/{ if ($0 !~ /ver:/) { print "rule block missing ver:"; bad=1 } } END{ exit bad?1:0 }' \
            <(sed -e ':a' -e '/\\$/N; s/\\\n//; ta' plugins/*.conf) || MISSING=1
          [ "$MISSING" -eq 0 ] && echo "✓ All rules carry a ver: tag"
          [ "$MISSING" -eq 0 ] || exit 1

      - name: Verify expected rules present
        run: |
          echo "Validating rule presence..."
          for ruleid in 9529010 9529012 \
                        9529099 9529101 9529102 9529103 9529104 9529105 9529106 \
                        9529200 9529201 9529210 9529220 9529230; do
            if ! grep "id:$ruleid" plugins/*.conf > /dev/null; then
              echo "ERROR: Rule ID $ruleid not found"
              exit 1
            fi
          done
          echo "✓ All expected rules present"

# NOTE: the official coreruleset/crs-plugin-test-action integration runner is
# intentionally NOT used here. At its pinned release it runs tests/regression/
# against a vanilla CRS with the plugin at its SHIPPED defaults and offers no
# working hook to set TX vars (its `crs-config` input is echoed to a file the
# bundled docker-compose never mounts). This plugin's deny layer is OPT-IN and
# the plugin is OFF by default, so on shipped defaults 9529220/9529230 never
# fire and the exclusions are skipped — the suite cannot pass there by design.
#
# Real functional coverage lives in the two dedicated workflows, which build a
# shared CRS image, enable the plugin + the
# positive-security layer (tests/integration/crs/crs-main.conf), then run the
# full go-ftw regression + security corpus on real engines:
#   - .github/workflows/apache-modsecurity2.yml   (Apache/v2)
#   - .github/workflows/nginx-libmodsecurity3.yml (NGINX/v3)
# Plus the official plugin lint (.github/workflows/lint.yml). The structure
# gates above stay as the integration smoke test.
