# OWASP CRS Plugin
# Plugin name: vimbadmin
# Plugin description: Tailored OWASP CRS support for ViMbAdmin --
#                     "before" rules (false-positive exclusions). Runs
#                     before the CRS rules so it can disable target checks.
# Rule ID block base: 9,529,000 (range is 1000, thus ID block base +1000)
# Plugin version: 1.0.3

# ------------------------------------------------------------------------
# These remove well-understood false positives in ViMbAdmin's admin UI.
# The whole block is gated by tx.vimbadmin-plugin_enabled (OFF by default,
# set to 1 only from the ViMbAdmin vhost), so these exclusions cannot weaken
# protection on other sites sharing the same CRS engine.
# ------------------------------------------------------------------------

# Master off-switch: when the plugin is not enabled for this vhost, strip the
# whole exclusion range (9529100-9529199) for this request.
SecRule TX:vimbadmin-plugin_enabled "!@eq 1" \
    "id:9529099,phase:1,pass,nolog,ver:'vimbadmin-plugin/1.0.3',ctl:ruleRemoveById=9529100-9529199"

# ------------------------------------------------------------------------
# [ Login ]  password may contain anything; the CSRF token is a long opaque
# blob that trips SQLi/encoding heuristics.
# ------------------------------------------------------------------------
SecRule REQUEST_FILENAME "@rx ^/(?:vimbadmin/)?(?:auth/login/?|index\.php)$" \
    "id:9529101,\
    phase:2,\
    pass,\
    t:none,\
    nolog,\
    ver:'vimbadmin-plugin/1.0.3',\
    tag:'OWASP_CRS',\
    tag:'vimbadmin',\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:password,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:current_password,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:new_password,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:confirm_new_password,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:csrf,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:captchatext"

# ------------------------------------------------------------------------
# [ Admin / mailbox password set ]  password fields on every set/reset route.
# The app uses both confirm_new_password and password_confirm spellings.
# ------------------------------------------------------------------------
SecRule REQUEST_FILENAME "@rx ^/(?:vimbadmin/)?(?:admin|mailbox|auth)/(?:add|edit|password|change-password|setup|reset-password|lost-password)(?:/|$)" \
    "id:9529102,\
    phase:2,\
    pass,\
    t:none,\
    nolog,\
    ver:'vimbadmin-plugin/1.0.3',\
    tag:'OWASP_CRS',\
    tag:'vimbadmin',\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:password,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:new_password,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:confirm_new_password,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:confirm_password,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:password_confirm,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:current_password,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:salt"

# ------------------------------------------------------------------------
# [ Alias add/edit ]  goto = comma-separated list of e-mail addresses;
# the @ , and dots upset XSS/SQLi regexes.
# ------------------------------------------------------------------------
SecRule REQUEST_FILENAME "@rx ^/(?:vimbadmin/)?alias/(?:add|edit)(?:/|$)" \
    "id:9529103,\
    phase:2,\
    pass,\
    t:none,\
    nolog,\
    ver:'vimbadmin-plugin/1.0.3',\
    tag:'OWASP_CRS',\
    tag:'vimbadmin',\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:goto,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:address,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:local_part"

# ------------------------------------------------------------------------
# [ Mailbox add/edit/email-settings ]  free-text name + alternate email;
# quota fields accept unit suffixes (e.g. "10GB").
# ------------------------------------------------------------------------
SecRule REQUEST_FILENAME "@rx ^/(?:vimbadmin/)?mailbox/(?:add|edit|email-settings)(?:/|$)" \
    "id:9529104,\
    phase:2,\
    pass,\
    t:none,\
    nolog,\
    ver:'vimbadmin-plugin/1.0.3',\
    tag:'OWASP_CRS',\
    tag:'vimbadmin',\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:name,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:alt_email,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:local_part,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:quota,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:max_quota"

# ------------------------------------------------------------------------
# [ Domain add/edit ]  description is free text; quota fields as above.
# ------------------------------------------------------------------------
SecRule REQUEST_FILENAME "@rx ^/(?:vimbadmin/)?domain/(?:add|edit)(?:/|$)" \
    "id:9529105,\
    phase:2,\
    pass,\
    t:none,\
    nolog,\
    ver:'vimbadmin-plugin/1.0.3',\
    tag:'OWASP_CRS',\
    tag:'vimbadmin',\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:description,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:quota,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:max_quota,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:transport"

# ------------------------------------------------------------------------
# [ typeahead ]  /additionalinfo/typeahead?query=...  -- a free-text
# search term the UI sends as the user types.
# ------------------------------------------------------------------------
SecRule REQUEST_FILENAME "@rx ^/(?:vimbadmin/)?additionalinfo/typeahead(?:/|$)" \
    "id:9529106,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    ver:'vimbadmin-plugin/1.0.3',\
    tag:'OWASP_CRS',\
    tag:'vimbadmin',\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:query"

# ------------------------------------------------------------------------
# [ DataTables prefs cookie ]  vm_prefs is a JSON blob the DataTables UI
# sets on every page, e.g. {"iLength":"100"}. The "iLength":" substring
# trips the SQLi auth-bypass family (942340 et al.) on REQUEST_COOKIES.
# It is sent on EVERY authenticated request, so drop the SQLi target for
# this one cookie rather than per-endpoint.
# ------------------------------------------------------------------------
SecAction \
    "id:9529107,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    ver:'vimbadmin-plugin/1.0.3',\
    tag:'OWASP_CRS',\
    tag:'vimbadmin',\
    ctl:ruleRemoveTargetByTag=attack-sqli;REQUEST_COOKIES:vm_prefs,\
    ctl:ruleRemoveTargetByTag=attack-sqli;REQUEST_COOKIES_NAMES:vm_prefs"
