# ------------------------------------------------------------------------
# OWASP CRS Plugin :: ViMbAdmin  --  "after" rules
# (positive security / allowlist layer; OPT-IN)
#
# Rule ID block base: 9,508,000 - 9,508,999  (uses 9508200-9508399)
# ------------------------------------------------------------------------
#
# This implements an ALLOWLIST: on the ViMbAdmin host, any request argument
# whose NAME is not one ViMbAdmin actually uses is blocked. This is the
# "allow what we allow, block everything else" model -- it stops parameter
# smuggling, mass-assignment probing and most automated scanners cold,
# regardless of payload.
#
# It is OFF by default (tx.vimbadmin_positive_security=0 in the config).
# Turn it on ONLY after running your CRS in DetectionOnly and confirming no
# legitimate field is missing from the allowlist below.
#
# The allowlist was derived by harvesting every form field + GET parameter
# from the application (controllers, forms, rendered templates).
# ------------------------------------------------------------------------

# Skip the whole layer unless explicitly enabled.
SecRule TX:vimbadmin_positive_security "!@eq 1" \
    "id:9508200,phase:2,pass,nolog,ctl:ruleRemoveById=9508201-9508399"

# Skip on any non-ViMbAdmin host.
SecRule REQUEST_HEADERS:Host "!@rx %{tx.vimbadmin_host}" \
    "id:9508201,phase:2,pass,t:none,nolog,ctl:ruleRemoveById=9508202-9508399"

# ------------------------------------------------------------------------
# The allowlist. Any ARGS_NAMES (GET or POST) not matching this regex on
# the ViMbAdmin host is denied. Update this regex if you add fields/plugins.
#
# Groups:
#   framework : Zend_Form ids + the CSRF token + captcha
#   routing   : the id params ViMbAdmin uses in GET links
#   auth      : login + password change/reset
#   domain    : domain add/edit
#   mailbox   : mailbox add/edit + email-settings + additional-info plugin
#   alias     : alias add/edit
#   admin     : admin add/edit + super toggle
#   plugins   : access-permission checkboxes + subform markers
# ------------------------------------------------------------------------
SecAction \
    "id:9508210,\
    phase:2,\
    pass,\
    t:none,\
    nolog,\
    setvar:'tx.vimbadmin_allow_args=^(?:\
csrf|captchaid|captchatext|submit|login|\
[a-z]+_(?:edit|addedit)_form|\
action|aid|did|mid|alid|arid|unset|send|ima|delete_files|debug|verbose|query|\
username|password|current_password|new_password|confirm_new_password|salt|rememberme|\
domain|description|transport|backupmx|active|max_aliases|max_mailboxes|max_quota|quota|\
local_part|name|email|type|alt_email|welcome_email|cc_welcome_email|requestnewimage|admin|super|\
goto|address|\
pluginsf_[A-Za-z]+|plugin_[A-Za-z0-9_]+\
)$'"

# Block requests carrying an argument name that is NOT in the allowlist.
# We compare each ARGS_NAMES against the compiled allow regex; a miss is an
# anomaly -> block (paranoia: this is a deny, not a CRS score bump).
SecRule ARGS_NAMES "!@rx %{tx.vimbadmin_allow_args}" \
    "id:9508220,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    t:none,t:lowercase,\
    msg:'ViMbAdmin positive-security: disallowed parameter name',\
    logdata:'unexpected arg: %{MATCHED_VAR_NAME}',\
    tag:'application-multi',\
    tag:'vimbadmin',\
    severity:'CRITICAL'"

# ------------------------------------------------------------------------
# Path allowlist: only ViMbAdmin's real controllers may be reached. Anything
# else under the ViMbAdmin host (probes for /wp-login.php, /.env, /vendor,
# /phpmyadmin, ...) is denied outright.
# ------------------------------------------------------------------------
SecRule REQUEST_FILENAME \
    "!@rx ^/(?:index\.php)?$|^/(?:additionalinfo|admin|alias|archive|auth|domain|error|exportsettings|index|log|mailbox)(?:/[a-z-]+)?/?$|\.(?:css|js|png|jpe?g|gif|ico|svg|woff2?|ttf|eot|map)$" \
    "id:9508230,\
    phase:1,\
    deny,\
    status:404,\
    log,\
    t:none,t:lowercase,t:normalizePath,\
    msg:'ViMbAdmin positive-security: request outside known route map',\
    logdata:'path: %{REQUEST_FILENAME}',\
    tag:'application-multi',\
    tag:'vimbadmin',\
    severity:'CRITICAL'"
