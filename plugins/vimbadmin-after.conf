# OWASP CRS Plugin
# Plugin name: vimbadmin
# Plugin description: Tailored OWASP CRS support for ViMbAdmin --
#                     "after" rules (positive security / allowlist layer;
#                     OPT-IN).
# Rule ID block base: 9,529,000 (range is 1000, thus ID block base +1000)
# Plugin version: 1.0.0

# ------------------------------------------------------------------------
# This implements an ALLOWLIST: on the ViMbAdmin host, any request argument
# whose NAME is not one ViMbAdmin actually uses is blocked. This is the
# "allow what we allow, block everything else" model -- it stops parameter
# smuggling, mass-assignment probing and most automated scanners cold,
# regardless of payload.
#
# It is OFF by default (tx.vimbadmin-plugin_positive_security=0 in config).
# Turn it on ONLY after running your CRS in DetectionOnly and confirming no
# legitimate field is missing from the allowlist below.
#
# The allowlist was derived by harvesting every form field + GET parameter
# from the application (controllers, forms, rendered templates).
# ------------------------------------------------------------------------

# Skip the whole layer unless the plugin is enabled for this vhost. There is
# no Host gate any more -- the plugin is OFF by default and enabled per vhost
# via tx.vimbadmin-plugin_enabled (see config), so the allowlist can never
# apply to another site sharing the CRS engine.
SecRule TX:vimbadmin-plugin_enabled "!@eq 1" \
    "id:9529200,phase:2,pass,nolog,ver:'vimbadmin-plugin/1.0.0',ctl:ruleRemoveById=9529201-9529399"

# Skip the layer unless the positive-security (allowlist) sub-feature is on.
SecRule TX:vimbadmin-plugin_positive_security "!@eq 1" \
    "id:9529201,phase:2,pass,nolog,ver:'vimbadmin-plugin/1.0.0',ctl:ruleRemoveById=9529202-9529399"

# ------------------------------------------------------------------------
# The allowlist. Any ARGS_NAMES (GET or POST) not matching this regex on
# the ViMbAdmin host is denied. Update this regex if you add fields/plugins.
#
# The regex is written INLINE on the rule below (not via a tx.* macro): a
# ModSecurity macro-expanded `@rx %{var}` does NOT round-trip regex character
# classes like `[a-z]` / `[A-Za-z0-9_]`, so a macro-based allowlist silently
# fails to match. Keep the pattern on the rule itself.
#
# Groups (in order below):
#   framework : Zend_Form ids + the CSRF token + captcha + submit/login
#   routing   : the id params ViMbAdmin uses in GET links
#   misc/ctrl : action/debug/verbose/query/etc. control params
#   auth      : login + password change/reset
#   domain    : domain add/edit
#   mailbox   : mailbox add/edit + email-settings + additional-info plugin
#   admin     : admin add/edit + super toggle
#   alias     : alias add/edit (goto/address)
#   plugins   : access-permission checkboxes + subform markers
# ------------------------------------------------------------------------
# The /mcp endpoint is a bearer-authenticated JSON-RPC API: its argument names
# are JSON keys that vary per method, and it is already gated by its own bearer
# token + IP allowlist (see the app + the Angie /mcp location). Skip the form
# arg-name allowlist for it so legitimate JSON bodies aren't blocked. The path
# allowlist (9529230) still applies.
SecRule REQUEST_URI "@rx (?:^|/)mcp(?:$|[/?])" \
    "id:9529210,\
    phase:1,\
    pass,\
    nolog,\
    t:none,t:lowercase,\
    ctl:ruleRemoveById=9529220,\
    ver:'vimbadmin-plugin/1.0.0',\
    tag:'vimbadmin'"

# ------------------------------------------------------------------------
# Block requests carrying an argument name that is NOT in the allowlist.
# Each ARGS_NAMES is matched against the inline allow regex; a miss is an
# anomaly -> block (this is a deny, not a CRS anomaly-score bump).
SecRule ARGS_NAMES "!@rx ^(?:csrf|code|op|verify|page|captchaid|captchatext|submit|login|[a-z]+_(?:edit|addedit)_form|action|aid|did|mid|alid|arid|unset|send|ima|delete_files|purge|confirm|debug|verbose|query|username|password|current_password|new_password|confirm_new_password|salt|rememberme|domain|description|transport|backupmx|active|max_aliases|max_mailboxes|max_quota|quota|local_part|name|email|type|alt_email|welcome_email|cc_welcome_email|requestnewimage|admin|super|goto|address|id|pluginsf_[A-Za-z]+|plugin_[A-Za-z0-9_]+)$" \
    "id:9529220,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    t:none,t:lowercase,\
    msg:'ViMbAdmin positive-security: disallowed parameter name',\
    logdata:'unexpected arg: %{MATCHED_VAR_NAME}',\
    ver:'vimbadmin-plugin/1.0.0',\
    tag:'OWASP_CRS',\
    tag:'application-multi',\
    tag:'vimbadmin',\
    severity:'CRITICAL'"

# ------------------------------------------------------------------------
# Path allowlist: only ViMbAdmin's real controllers may be reached. Anything
# else under the ViMbAdmin host (probes for /wp-login.php, /.env, /vendor,
# /phpmyadmin, ...) is denied outright.
# Mount-agnostic: the route token is matched after ANY leading prefix via
# (?:^|/), so the same allowlist works whether ViMbAdmin is served at the
# webroot OR under a location like /vimbadmin/. ModSecurity at the edge sees
# the client-facing path (with the location prefix); a proxy_pass that strips
# the prefix means the backend sees it at the root -- both forms pass. The
# end of each branch stays strictly anchored ($), so only real controller
# routes (optionally one /sub-action followed by ViMbAdmin's params-in-path
# /key/value pairs, e.g. admin/purge/aid/4/csrf/<token>) and known static
# extensions get through.
# ------------------------------------------------------------------------
SecRule REQUEST_FILENAME \
    "!@rx (?:^|/)(?:index\.php)?$|(?:^|/)(?:additionalinfo|admin|alias|archive|auth|domain|error|exportsettings|index|log|mailbox|maintenance|mcp|queue)(?:/[a-z-]+(?:/[a-z]+/[A-Za-z0-9._@=+-]+)*)?/?$|\.(?:css|js|png|jpe?g|gif|ico|svg|woff2?|ttf|eot|map)$" \
    "id:9529230,\
    phase:2,\
    deny,\
    status:404,\
    log,\
    t:none,t:lowercase,t:normalizePath,\
    msg:'ViMbAdmin positive-security: request outside known route map',\
    logdata:'path: %{REQUEST_FILENAME}',\
    ver:'vimbadmin-plugin/1.0.0',\
    tag:'OWASP_CRS',\
    tag:'application-multi',\
    tag:'vimbadmin',\
    severity:'CRITICAL'"
