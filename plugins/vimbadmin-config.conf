# OWASP CRS Plugin
# Plugin name: vimbadmin
# Plugin description: Tailored OWASP CRS support for ViMbAdmin
#                     (https://github.com/eilandert/ViMbAdmin). Provides
#                     false-positive exclusions for the admin panel AND an
#                     optional positive-security (allowlist) layer that
#                     blocks any request parameter the application does not
#                     itself use.
# Rule ID block base: 9,529,000 (range is 1000, thus ID block base +1000)
# Plugin version: 1.0.3

# ------------------------------------------------------------------------
#  HOW TO USE
# ------------------------------------------------------------------------
#  1. Copy the three plugins/vimbadmin-*.conf files into your CRS
#     plugins/ directory (they are loaded automatically by crs-setup).
#
#  2. Scope: the plugin is OFF by default and is enabled PER VHOST. In the
#     ViMbAdmin server/location block, set tx.vimbadmin-plugin_enabled=1 via
#     a phase:1 SecAction (see the enable example below). The rules never
#     touch other vhosts sharing the same CRS install because the flag is
#     only set in that one block.
#
#  3. The positive-security / allowlist layer (vimbadmin-after.conf) is ON
#     for enabled ViMbAdmin vhosts by default. It is strict: it BLOCKS any
#     argument name ViMbAdmin doesn't use. To run value scanning WITHOUT the
#     allowlist, set tx.vimbadmin-plugin_positive_security=0 explicitly in
#     the same enable block (it wins over the default). Test in DetectionOnly
#     first.
# ------------------------------------------------------------------------

# Enable flag (per vhost). OFF by default, because the plugin weakens CRS
# coverage on the ViMbAdmin routes and must never apply to other vhosts
# sharing the same CRS engine. Enable it from the ViMbAdmin server/location
# block, e.g.:
#
#   modsecurity_rules '
#       SecAction "id:9529001,phase:1,nolog,pass,\
#           setvar:tx.vimbadmin-plugin_enabled=1"
#   ';
#
# The seeder below sets the variable to 0 only if a vhost has not already
# set it to 1, so a vhost opt-in wins. Scoping is done entirely by this
# enable flag -- there is no Host gate (see before/after).
SecRule &TX:vimbadmin-plugin_enabled "@eq 0" \
    "id:9529010,\
    phase:1,\
    pass,\
    nolog,\
    ver:'vimbadmin-plugin/1.0.3',\
    setvar:'tx.vimbadmin-plugin_enabled=0'"

# --- Positive-security (allowlist) layer ---------------------------------
# When set to 1, vimbadmin-after.conf blocks any ARGS_NAMES that is not in
# the ViMbAdmin allowlist (see that file).
#
# Default: ON once the plugin is enabled. This variable is seeded to 1 while
# the after-file still gates the deny rules on tx.vimbadmin-plugin_enabled, so
# non-ViMbAdmin vhosts remain unaffected even when this default is present.
#
# Override (escape hatch): a vhost that wants value scanning WITHOUT the
# allowlist sets tx.vimbadmin-plugin_positive_security=0 explicitly in its
# enable block. Because this seeder only fires when the variable is unset
# (&TX ... "@eq 0"), the explicit vhost value always wins. E.g.:
#
#   SecAction "id:9529001,phase:1,nolog,pass,\
#       setvar:tx.vimbadmin-plugin_enabled=1,\
#       setvar:tx.vimbadmin-plugin_positive_security=0"
SecRule &TX:vimbadmin-plugin_positive_security "@eq 0" \
    "id:9529012,\
    phase:1,\
    pass,\
    nolog,\
    ver:'vimbadmin-plugin/1.0.3',\
    setvar:'tx.vimbadmin-plugin_positive_security=1'"
