# OWASP CRS Plugin
# Plugin name: vimbadmin
# Plugin description: Tailored OWASP CRS support for ViMbAdmin
#                     (https://github.com/eilandert/ViMbAdmin). Provides
#                     false-positive exclusions for the admin panel AND an
#                     optional positive-security (allowlist) layer that
#                     blocks any request parameter the application does not
#                     itself use.
# Rule ID block base: 9,529,000 (range is 1000, thus ID block base +1000)
# Plugin version: 1.0.0

# ------------------------------------------------------------------------
#  HOW TO USE
# ------------------------------------------------------------------------
#  1. Copy the three plugins/vimbadmin-*.conf files into your CRS
#     plugins/ directory (they are loaded automatically by crs-setup).
#
#  2. Scope: by default the rules only fire for requests whose Host matches
#     tx.vimbadmin_host (a regex). Set it to YOUR ViMbAdmin
#     hostname(s) so the rules never touch other vhosts sharing the same CRS
#     install.
#
#  3. The positive-security / allowlist layer (vimbadmin-after.conf) is
#     OPT-IN. It is strict: it BLOCKS any argument name ViMbAdmin doesn't
#     use. Test in DetectionOnly first, then enable.
# ------------------------------------------------------------------------

# Generic rule to disable the plugin
#
# Plugins are enabled by default. They become active by placing them in the
# plugin folder. Activation can be controlled by setting a variable. The
# predefined variable name is "<plugin name>-plugin_enabled"; for this plugin
# that is tx.vimbadmin-plugin_enabled. A global setting overrides the value
# set here, so the variable is only seeded if it has not been set before.
SecRule &TX:vimbadmin-plugin_enabled "@eq 0" \
    "id:9529010,\
    phase:1,\
    pass,\
    nolog,\
    ver:'vimbadmin-plugin/1.0.0',\
    setvar:'tx.vimbadmin-plugin_enabled=1'"

# --- Which Host(s) is ViMbAdmin served on? -----------------------------
# Host pattern consumed by the before/after gates as `@rx ^%{tx.vimbadmin_host}$`
# (the ^...$ anchors live on the rule, NOT in this value). Two constraints
# shape the value:
#   - the CRS static syntax linter (secrules-parsing) only allows
#     [a-zA-Z0-9-_.] inside a setvar value, so NO ^ $ ( ) here;
#   - a ModSecurity macro-expanded @rx does not round-trip backslash escapes
#     or [.] character classes, so the `.` is a bare regex wildcard.
# A plain dotted hostname (optionally an alternation written WITHOUT parens,
# e.g. "vimbadmin.example.com" or "mail.example.com") covers normal use.
# For multiple hosts, set the variable yourself with a non-parenthesised
# alternation or duplicate the gate.
SecRule &TX:vimbadmin_host "@eq 0" \
    "id:9529011,\
    phase:1,\
    pass,\
    nolog,\
    ver:'vimbadmin-plugin/1.0.0',\
    setvar:'tx.vimbadmin_host=vimbadmin.example.com'"

# --- Positive-security (allowlist) layer: OFF by default ----------------
# When set to 1, vimbadmin-after.conf blocks any ARGS_NAMES that is not in
# the ViMbAdmin allowlist (see that file). Turn on only after testing.
SecRule &TX:vimbadmin-plugin_positive_security "@eq 0" \
    "id:9529012,\
    phase:1,\
    pass,\
    nolog,\
    ver:'vimbadmin-plugin/1.0.0',\
    setvar:'tx.vimbadmin-plugin_positive_security=0'"
