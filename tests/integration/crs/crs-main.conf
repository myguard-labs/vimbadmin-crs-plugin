# Single include chain loaded identically by Apache (mod_security2) and
# Angie (libmodsecurity3). Anything that fails to parse here fails BOTH
# engine builds.

Include /opt/crs/modsecurity.conf
Include /opt/crs/crs-setup.conf

# go-ftw log marker. The harness brackets every test with requests carrying
# an X-CRS-Test header holding a UUID; this rule echoes that UUID into the
# audit log so go-ftw can locate each test's start/end boundary. CI-only,
# id outside the plugin's 9529xxx block and CRS ranges.
SecRule REQUEST_HEADERS:X-CRS-Test "@rx ^.*$" \
    "id:999999,phase:1,pass,t:none,log,auditlog,msg:'X-CRS-Test=%{MATCHED_VAR}'"

# Plugin phase-1 config (defaults / feature gates).
# Plain `Include` only: libmodsecurity3 3.0.14 does NOT understand
# IncludeOptional.
Include /opt/crs/plugins/*-config.conf

# CI: enable the plugin (it is OFF by default and enabled per-vhost in
# production) and turn ON the opt-in positive-security / allowlist layer so
# the deny rules 9529220 + 9529230 and the path allowlist are actually
# exercised. On a production deployment the operator sets these in the
# ViMbAdmin server/location block; this only affects the integration image.
SecAction "id:9519990,phase:1,nolog,pass,t:none,setvar:tx.vimbadmin-plugin_enabled=1"
SecAction "id:9519991,phase:1,nolog,pass,t:none,setvar:tx.vimbadmin-plugin_positive_security=1"

# CI-only: go-ftw v2 brackets every test with boundary-marker requests to
# /status/<code>. That path is not a ViMbAdmin route, so the positive-security
# path allowlist (9529230) legitimately denies it -- but the deny lands inside
# the test's start/end marker window and pollutes no_expect_ids assertions.
# Strip the two allowlist deny rules for the marker path only (phase:1 ctl
# applies to the later phase-2 evaluation). Production never sees /status/.
SecRule REQUEST_URI "@rx ^/status/\d+" \
    "id:9519992,phase:1,pass,nolog,t:none,ctl:ruleRemoveById=9529220,ctl:ruleRemoveById=9529230"

# Plugin "before" rules -> CRS core rules -> plugin "after" rules.
Include /opt/crs/plugins/*-before.conf
Include /opt/crs/rules/*.conf
Include /opt/crs/plugins/*-after.conf
