# Single include chain loaded identically by Apache (mod_security2) and
# Angie (libmodsecurity3). Anything that fails to parse here fails BOTH
# engine builds.

Include /opt/crs/modsecurity.conf
Include /opt/crs/crs-setup.conf

# go-ftw log marker. The harness brackets every test with requests carrying
# an X-CRS-Test header holding a UUID; this rule echoes that UUID into the
# audit log so go-ftw can locate each test's start/end boundary. CI-only,
# id outside the plugin's 9529xxx block and CRS ranges.
SecRule REQUEST_HEADERS:X-CRS-Test "@rx ^.*$" \
    "id:999999,phase:1,pass,t:none,log,auditlog,msg:'X-CRS-Test=%{MATCHED_VAR}'"

# Plugin phase-1 config (defaults / feature gates).
# Plain `Include` only: libmodsecurity3 3.0.14 does NOT understand
# IncludeOptional.
Include /opt/crs/plugins/*-config.conf

# CI: scope the plugin to the test host (ci.local) and turn ON the opt-in
# positive-security / allowlist layer so the deny rules 9529220 + 9529230
# and the path allowlist are actually exercised. On a production deployment
# the operator sets these; this only affects the integration test image.
SecAction "id:9519990,phase:1,nolog,pass,t:none,setvar:tx.vimbadmin_host=^ci.local$"
SecAction "id:9519991,phase:1,nolog,pass,t:none,setvar:tx.vimbadmin-plugin_positive_security=1"

# Plugin "before" rules -> CRS core rules -> plugin "after" rules.
Include /opt/crs/plugins/*-before.conf
Include /opt/crs/rules/*.conf
Include /opt/crs/plugins/*-after.conf
